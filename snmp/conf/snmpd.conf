###############################################################################
#  snmpd.conf — AvionDash SNMP Agent  (SNMPv3 only)
#
#  NOTE: Bind address passed as positional arg in entrypoint (udp:0.0.0.0:161)
#  NOT via agentAddress here — that directive fails in this Docker/Net-SNMP
#  combination.
#
#  USM createUser lines are written to /var/lib/snmp/snmpd.conf by
#  entrypoint.sh on every start. snmpd reads that file automatically.
###############################################################################

# ── System identity ──────────────────────────────────────────────────────────
sysDescr    "AvionDash SNMP Agent - Neomon Aviation Platform v1.0"
sysLocation "AvionDash Demo Environment"
sysContact  "noc@neomon.local"
sysName     "aviondash-snmp"
sysServices 76

# ── VACM views ────────────────────────────────────────────────────────────────
view avdView  included  .1.3.6.1.4.1.21308
view avdView  included  .1.3.6.1.2.1.1

# ── VACM groups ───────────────────────────────────────────────────────────────
group avdReadGroup   usm  avdread
group avdAdminGroup  usm  avdadmin

# ── VACM access ───────────────────────────────────────────────────────────────
access avdReadGroup   ""  usm  authPriv  exact  avdView  none     avdView
access avdAdminGroup  ""  usm  authPriv  exact  avdView  avdView  avdView

# ── pass_persist handler ──────────────────────────────────────────────────────
# Uses pass_persist so the Python handler stays resident between polls.
# Registered on .1.3.6.1.4.1.21308.1 (aviondashMIB sub-node).
# The handler is kept alive by snmpd across multiple GET/GETNEXT calls.
pass_persist .1.3.6.1.4.1.21308.1 /usr/bin/python3 /usr/local/lib/snmp/aviondash_pass.py
