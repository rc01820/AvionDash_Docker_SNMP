
services:

  # ── Database tier ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: aviondash-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aviondash_root}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-aviondash}
      MYSQL_USER:          ${MYSQL_USER:-aviondash}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-aviondash_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-aviondash_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      com.aviondash.tier: "database"
      com.aviondash.service: "aviondash"

  # ── Application tier ──────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: aviondash-app
    restart: unless-stopped
    environment:
      DB_HOST:     db
      DB_PORT:     "3306"
      DB_NAME:     ${MYSQL_DATABASE:-aviondash}
      DB_USER:     ${MYSQL_USER:-aviondash}
      DB_PASSWORD: ${MYSQL_PASSWORD:-aviondash_pass}
      SECRET_KEY:  ${SECRET_KEY:-aviondash-secret-key-change-in-prod}
      # SNMP trap destination
      SNMP_TRAP_HOST:       ${SNMP_TRAP_HOST:-snmp-agent}
      SNMP_TRAP_PORT:       "162"
      SNMP_TRAP_USER:       ${SNMP_ADMIN_USER:-avdadmin}
      SNMP_TRAP_AUTH_PASS:  ${SNMP_ADMIN_AUTH_PASS:-avdAdminAuth123}
      SNMP_TRAP_PRIV_PASS:  ${SNMP_ADMIN_PRIV_PASS:-avdAdminPriv123}
      SNMP_TRAP_AUTH_PROTO: "SHA"
      SNMP_TRAP_PRIV_PROTO: "AES"
      SNMP_TRAPS_ENABLED:   ${SNMP_TRAPS_ENABLED:-true}
      # Datadog (optional)
      DD_SERVICE:   aviondash-app
      DD_ENV:       demo
      DD_VERSION:   "1.0.0"
      DD_TRACE_ENABLED: ${DD_TRACE_ENABLED:-false}
    volumes:
      - app_logs:/var/log/aviondash
    ports:
      - "8000:8000"
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    labels:
      com.aviondash.tier: "application"
      com.aviondash.service: "aviondash"

  # ── Web tier ──────────────────────────────────────────────────────────────
  web:
    image: nginx:1.25-alpine
    container_name: aviondash-web
    restart: unless-stopped
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf/aviondash.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy
    labels:
      com.aviondash.tier: "web"
      com.aviondash.service: "aviondash"

  # ── SNMP Agent ────────────────────────────────────────────────────────────
  snmp-agent:
    build:
      context: ./snmp
      dockerfile: Dockerfile
      # Increment this to force a full rebuild: docker compose build --no-cache snmp-agent
      args:
        BUILD_VERSION: "1.6"
    container_name: aviondash-snmp
    restart: unless-stopped
    environment:
      # Read-only user credentials
      SNMP_READ_USER:       ${SNMP_READ_USER:-avdread}
      SNMP_READ_AUTH_PASS:  ${SNMP_READ_AUTH_PASS:-avdReadAuth123}
      SNMP_READ_PRIV_PASS:  ${SNMP_READ_PRIV_PASS:-avdReadPriv123}
      SNMP_READ_AUTH_PROTO: "SHA"
      SNMP_READ_PRIV_PROTO: "AES"
      # Admin user credentials
      SNMP_ADMIN_USER:       ${SNMP_ADMIN_USER:-avdadmin}
      SNMP_ADMIN_AUTH_PASS:  ${SNMP_ADMIN_AUTH_PASS:-avdAdminAuth123}
      SNMP_ADMIN_PRIV_PASS:  ${SNMP_ADMIN_PRIV_PASS:-avdAdminPriv123}
      SNMP_ADMIN_AUTH_PROTO: "SHA"
      SNMP_ADMIN_PRIV_PROTO: "AES"
      # FastAPI metrics endpoint
      AVIONDASH_API_URL: http://app:8000
    volumes:
      - snmp_varlib:/var/lib/snmp
      - snmp_logs:/var/log/snmp
    ports:
      - "16100:161/udp"   # SNMP queries  (host 16100 → container 161)
      - "16200:162/udp"   # SNMP traps   (host 16200 → container 162)
    networks:
      - backend
      - frontend
    depends_on:
      app:
        condition: service_healthy
    labels:
      com.aviondash.tier: "snmp"
      com.aviondash.service: "aviondash"

  # ── Datadog Agent (optional — uncomment + set DD_API_KEY) ────────────────
