  #     DD_APM_ENABLED:                       "true"
  #     DD_APM_NON_LOCAL_TRAFFIC:             "true"
  #     DD_LOGS_ENABLED:                      "true"
  #     DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
  #     DD_PROCESS_AGENT_ENABLED:             "true"
  #     DD_DOGSTATSD_NON_LOCAL_TRAFFIC:       "true"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - /proc/:/host/proc/:ro
  #     - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
  #   ports:
  #     - "8125:8125/udp"
  #     - "8126:8126"
  #   networks:
  #     - backend
  #     - frontend

networks:
  frontend:
    name: aviondash-frontend
  backend:
    name: aviondash-backend

volumes:
  db_data:
    name: aviondash-db-data
  app_logs:
    name: aviondash-app-logs
  nginx_logs:
    name: aviondash-nginx-logs
  snmp_varlib:
    name: aviondash-snmp-varlib
  snmp_logs:
    name: aviondash-snmp-logs
